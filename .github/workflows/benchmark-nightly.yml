name: Benchmark Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  benchmark:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        profile: [long, real-smoke]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-12 g++-12 \
            libboost-all-dev \
            git curl wget \
            python3

      - name: Configure Release build
        env:
          CC: /usr/bin/gcc-12
          CXX: /usr/bin/g++-12
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DPROJECTBONK_ENABLE_JULIA_RUNTIME=OFF

      - name: Run benchmark comparison
        run: |
          mkdir -p build/benchmark-reports/${{ matrix.profile }}
          python3 ./scripts/benchmark_compare.py \
            --profile ${{ matrix.profile }} \
            --current-build-dir build \
            --report-json build/benchmark-reports/${{ matrix.profile }} \
            --report-md build/benchmark-reports/${{ matrix.profile }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.profile }}
          path: build/benchmark-reports/${{ matrix.profile }}
          if-no-files-found: warn

  real-long-envelope:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-12 g++-12 \
            libboost-all-dev \
            git curl wget \
            python3

      - name: Configure Release build
        env:
          CC: /usr/bin/gcc-12
          CXX: /usr/bin/g++-12
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DPROJECTBONK_ENABLE_JULIA_RUNTIME=OFF

      - name: Run real-long benchmark envelope
        run: |
          mkdir -p build/benchmark-reports/real-long-envelope
          python3 ./scripts/benchmark_envelope.py \
            --profile real-long \
            --runs 5 \
            --current-build-dir build \
            --report-json build/benchmark-reports/real-long-envelope \
            --report-md build/benchmark-reports/real-long-envelope

      - name: Upload real-long envelope artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-real-long-envelope
          path: build/benchmark-reports/real-long-envelope
          if-no-files-found: warn