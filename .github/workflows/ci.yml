name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-12 g++-12 \
            libboost-all-dev \
            git curl wget

      - name: Configure
        env:
          CC: /usr/bin/gcc-12
          CXX: /usr/bin/g++-12
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DPROJECTBONK_ENABLE_JULIA_RUNTIME=OFF

      - name: Build project
        run: cmake --build build --target ProjectBONK -j"$(nproc)"

      - name: Build safety gate targets
        run: |
          cmake --build build --target phase2_regression_gate
          cmake --build build --target broad_phase_sanity_gate
          cmake --build build --target narrow_phase_false_negative_regression_gate
          cmake --build build --target narrow_phase_false_negative_canary_gate
          cmake --build build --target recovery_slot_acceptance_gate
          cmake --build build --target recovery_planner_invariants_gate
          cmake --build build --target maneuver_ops_invariants_regression_gate
          cmake --build build --target api_contract_regression_gate

      - name: Run strict adaptive regression gate script
        run: ./scripts/phase2_regression_gate.sh

      - name: Run broad-phase sanity gate script
        run: ./scripts/broad_phase_sanity_gate.sh

      - name: Run narrow-phase false-negative gate script
        run: ./scripts/narrow_phase_false_negative_gate.sh

      - name: Run narrow-phase false-negative canary script
        run: bash ./scripts/narrow_phase_false_negative_canary.sh ./build ./build/narrow_phase_false_negative_canary_summary.json

      - name: Run recovery slot gate script
        run: ./scripts/recovery_slot_gate.sh

      - name: Run recovery planner invariants gate script
        run: ./scripts/recovery_planner_invariants_gate.sh

      - name: Run maneuver ops invariants gate script
        run: ./scripts/maneuver_ops_invariants_gate.sh

      - name: Run API contract gate script
        run: ./scripts/api_contract_gate.sh

      - name: Run phase4 aggregate calibration gate
        run: ./scripts/phase4_calibration_gate.sh ./build

      - name: Run phase4 law assertions gate
        run: ./scripts/phase4_law_assertions_gate.sh ./build/phase4_calibration_gate_summary.json 1

      - name: Upload phase4 calibration summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-calibration-summary
          path: build/phase4_calibration_gate_summary.json
          if-no-files-found: warn

      - name: Upload narrow-phase canary summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: narrow-phase-false-negative-canary-summary
          path: build/narrow_phase_false_negative_canary_summary.json
          if-no-files-found: warn

      - name: Run CTest safety suite
        run: ctest --test-dir build --output-on-failure
