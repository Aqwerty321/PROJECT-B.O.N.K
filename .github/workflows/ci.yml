name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-gate:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-12 g++-12 \
            libboost-all-dev \
            git curl wget \
            python3

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-

      - name: Configure
        env:
          CC: /usr/bin/gcc-12
          CXX: /usr/bin/g++-12
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DPROJECTBONK_ENABLE_JULIA_RUNTIME=OFF

      - name: Build submission targets
        run: |
          cmake --build build --target \
            ProjectBONK \
            phase2_regression \
            broad_phase_validation \
            narrow_phase_false_negative_gate \
            recovery_slot_gate \
            recovery_planner_invariants \
            maneuver_ops_invariants_gate \
            api_contract_gate \
            -j"$(nproc)"

      - name: Run strict adaptive regression gate script
        run: ./scripts/phase2_regression_gate.sh

      - name: Run broad-phase sanity gate script
        run: ./scripts/broad_phase_sanity_gate.sh

      - name: Run narrow-phase false-negative gate script
        run: ./scripts/narrow_phase_false_negative_gate.sh

      - name: Run recovery slot gate script
        run: ./scripts/recovery_slot_gate.sh

      - name: Run recovery planner invariants gate script
        run: ./scripts/recovery_planner_invariants_gate.sh

      - name: Run maneuver ops invariants gate script
        run: ./scripts/maneuver_ops_invariants_gate.sh

      - name: Run API contract gate script
        run: ./scripts/api_contract_gate.sh

      - name: Run CTest safety suite
        run: ctest --test-dir build --output-on-failure

      - name: Run Docker API smoke gate
        run: ./scripts/docker_api_smoke.sh
